<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Editar Acervo')}"></th:block>
<body>

<th:block th:replace="~{fragments/head :: header}"></th:block>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- CARD DO FORMULÁRIO -->
            <div class="form-container fade-in">
                <div class="text-center mb-4">
                    <i class="fas fa-book" style="font-size: 3rem; color: var(--dourado-champagne);"></i>
                    <h1 class="mt-3">✏️ Editar Acervo</h1>
                    <p class="text-muted">
                        Atualize os dados do material no catálogo
                    </p>
                </div>

                <form th:action="@{/acervo/save}" th:object="${acervo}" method="POST">
                    <!-- Campo oculto necessário para edição -->
                    <input type="hidden" th:field="*{id}" />

                    <!-- Campo Título -->
                    <div class="form-group row">
                        <label for="titulo" class="col-sm-2 col-form-label">
                            <i class="fas fa-heading"></i> Título *
                        </label>
                        <div class="col-sm-10">
                            <input type="text" 
                                   th:field="*{titulo}" 
                                   class="form-control" 
                                   id="titulo"
                                   placeholder="Digite o título do material">
                            <p th:if="${#fields.hasErrors('titulo')}" 
                               th:errorclass="text-danger" 
                               th:errors="*{titulo}" 
                               class="text-danger small"/>
                            <small class="form-text text-muted">Ex: Dom Casmurro, O Alquimista, etc.</small>
                        </div>
                    </div>

                    <!-- Campo Autor -->
                    <div class="form-group row">
                        <label for="autor" class="col-sm-2 col-form-label">
                            <i class="fas fa-user"></i> Autor *
                        </label>
                        <div class="col-sm-10">
                            <input type="text" 
                                   th:field="*{autor}" 
                                   class="form-control" 
                                   id="autor"
                                   placeholder="Digite o nome do autor">
                            <p th:if="${#fields.hasErrors('autor')}" 
                               th:errorclass="text-danger" 
                               th:errors="*{autor}" 
                               class="text-danger small"/>
                            <small class="form-text text-muted">Nome completo do autor ou organizador</small>
                        </div>
                    </div>

                    <!-- Campo Tipo -->
                    <div class="form-group row">
                        <label for="tipo" class="col-sm-2 col-form-label">
                            <i class="fas fa-tag"></i> Tipo *
                        </label>
                        <div class="col-sm-10">
                            <select th:field="*{tipo}" class="form-control" id="tipo">
                                <option value="">Selecione o tipo...</option>
                                <option value="Livro">📚 Livro</option>
                                <option value="Artigo">📄 Artigo</option>
                                <option value="Vídeo">🎥 Vídeo</option>
                                <option value="Tese">📖 Tese</option>
                                <option value="Periódico">📰 Periódico</option>
                            </select>
                            <p th:if="${#fields.hasErrors('tipo')}" 
                               th:errorclass="text-danger" 
                               th:errors="*{tipo}" 
                               class="text-danger small"/>
                        </div>
                    </div>

                    <!-- Campo Ano -->
                    <div class="form-group row">
                        <label for="ano" class="col-sm-2 col-form-label">
                            <i class="far fa-calendar-alt"></i> Ano
                        </label>
                        <div class="col-sm-10">
                            <input type="number" 
                                   th:field="*{ano}" 
                                   class="form-control" 
                                   id="ano"
                                   placeholder="Digite o ano"
                                   min="1000" 
                                   max="2025">
                            <p th:if="${#fields.hasErrors('ano')}" 
                               th:errorclass="text-danger" 
                               th:errors="*{ano}" 
                               class="text-danger small"/>
                            <small class="form-text text-muted">Ano de publicação (ex: 2024)</small>
                        </div>
                    </div>

                    <!-- Campo Quantidade -->
                    <div class="form-group row">
                        <label for="quantidade" class="col-sm-2 col-form-label">
                            <i class="fas fa-copy"></i> Quantidade *
                        </label>
                        <div class="col-sm-10">
                            <input type="number" 
                                   th:field="*{quantidade}" 
                                   class="form-control" 
                                   id="quantidade"
                                   placeholder="Digite a quantidade disponível"
                                   min="0">
                            <p th:if="${#fields.hasErrors('quantidade')}" 
                               th:errorclass="text-danger" 
                               th:errors="*{quantidade}" 
                               class="text-danger small"/>
                            <small class="form-text text-muted">Número de exemplares disponíveis</small>
                        </div>
                    </div>

                    <!-- Campo URL da Imagem -->
                    <div class="form-group row">
                        <label for="urlImagem" class="col-sm-2 col-form-label">
                            <i class="fas fa-image"></i> URL da Imagem
                        </label>
                        <div class="col-sm-10">
                            <input type="url" 
                                   th:field="*{urlImagem}" 
                                   class="form-control" 
                                   id="urlImagem"
                                   placeholder="https://exemplo.com/capa-livro.jpg">
                            <small class="form-text text-muted">
                                <i class="fas fa-info-circle"></i> Dica: Use URLs de imagens online
                            </small>
                            
                            <!-- Pré-visualização da imagem -->
                            <div class="mt-3" id="previewContainer" style="display: none;">
                                <label>📸 Pré-visualização:</label>
                                <div style="border: 2px solid var(--dourado-champagne); border-radius: 8px; padding: 10px; display: inline-block;">
                                    <img id="imagePreview" src="" alt="Prévia da capa" 
                                         style="max-width: 200px; max-height: 200px; border-radius: 4px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botões do Formulário -->
                    <div class="form-group text-center mt-5">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Atualizar Acervo
                        </button>
                        <a href="/acervo" class="btn btn-outline-gold btn-lg ml-2">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/darkmode-btn :: darkmode-btn}"></th:block>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

<script>
// Pré-visualização da imagem
const urlImagemInput = document.getElementById('urlImagem');
const previewContainer = document.getElementById('previewContainer');
const imagePreview = document.getElementById('imagePreview');

if(urlImagemInput) {
    urlImagemInput.addEventListener('input', function() {
        const url = this.value.trim();
        
        if(url && (url.startsWith('http://') || url.startsWith('https://'))) {
            imagePreview.src = url;
            previewContainer.style.display = 'block';
            
            imagePreview.onerror = function() {
                this.src = 'https://via.placeholder.com/200x300?text=Imagem+Não+Encontrada';
                this.alt = 'Imagem não disponível';
            };
        } else {
            previewContainer.style.display = 'none';
            imagePreview.src = '';
        }
    });
}

// Se estiver editando e tiver imagem, mostra prévia
window.addEventListener('DOMContentLoaded', function() {
    const urlExistente = document.getElementById('urlImagem').value;
    if(urlExistente && (urlExistente.startsWith('http://') || urlExistente.startsWith('https://'))) {
        imagePreview.src = urlExistente;
        previewContainer.style.display = 'block';
    }
});
</script>

<style>
/* Estilos adicionais específicos do formulário */
.form-container {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: var(--sombra-media);
    margin: 2rem 0;
    transition: var(--transicao);
}

.form-container:hover {
    box-shadow: var(--sombra-dourada);
}

.fade-in {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.btn-lg {
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 600;
}

.ml-2 {
    margin-left: 0.5rem;
}

#urlImagem {
    font-family: monospace;
    font-size: 0.9rem;
}

.form-control::placeholder {
    font-style: italic;
    color: #999;
}

body.dark-mode .form-container {
    background: #11163f;
}

body.dark-mode .text-muted {
    color: #aaa !important;
}

body.dark-mode .form-text {
    color: #aaa !important;
}

body.dark-mode #previewContainer div {
    background: #1a1f4a;
}
</style>

</body>
</html>
