<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<th:block th:replace="~{fragments/head :: head('Listar Acervo')}"></th:block>
<body>

<th:block th:replace="~{fragments/head :: header}"></th:block>

<div class="container">
    <!-- TÍTULO DA PÁGINA -->
    <div class="row mb-4">
        <div class="col">
            <h1>Listagem do Acervo</h1>
            <p class="text-muted">Gerencie seu catálogo de livros e materiais</p>
        </div>
    </div>

    <!-- GRID DE LIVROS COM IMAGENS -->
    <div class="livros-grid">
        <div th:each="acervo : ${listaAcervo}" class="card-livro fade-in">
            <!-- Verifica se tem imagem -->
            <div th:if="${acervo.urlImagem != null and acervo.urlImagem != ''}" 
                 class="card-livro-img-wrapper">
                <img th:src="${acervo.urlImagem}" 
                     th:alt="${acervo.titulo}"
                     class="card-livro-img"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/300x400?text=Capa+Não+Disponível'">
            </div>
            <!-- Fallback quando não tem imagem -->
            <div th:unless="${acervo.urlImagem != null and acervo.urlImagem != ''}" 
                 class="card-livro-img" 
                 style="background: linear-gradient(135deg, var(--verde-floresta), var(--azul-noturno)); display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-book" style="font-size: 4rem; color: var(--dourado-champagne);"></i>
            </div>
            
            <div class="card-livro-content">
                <div class="card-livro-titulo" th:text="${acervo.titulo}">Título do Livro</div>
                <div class="card-livro-autor">
                    <i class="fas fa-user"></i> <span th:text="${acervo.autor}">Autor</span>
                </div>
                <div class="mb-2">
                    <span class="badge-tipo">
                        <i class="fas fa-tag"></i> <span th:text="${acervo.tipo}">Tipo</span>
                    </span>
                </div>
                <div class="card-livro-ano">
                    <i class="far fa-calendar-alt"></i> Ano: <span th:text="${acervo.ano}">2024</span>
                </div>
                <div class="card-livro-ano mt-1">
                    <i class="fas fa-copy"></i> Quantidade: <span th:text="${acervo.quantidade}">0</span>
                </div>
                <div class="mt-3 d-flex gap-2">
                    <a th:href="@{'/acervo/edit/' + ${acervo.id}}" 
                       class="btn btn-sm btn-outline-gold">
                        <i class="fas fa-edit"></i> Editar
                    </a>
                    <a sec:authorize="hasAuthority('Admin')" th:href="@{'/acervo/delete/' + ${acervo.id}}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Tem certeza que deseja excluir este item?')">
                        <i class="fas fa-trash"></i> Excluir
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- MENSAGEM QUANDO NÃO HÁ DADOS -->
    <div th:if="${#lists.isEmpty(listaAcervo)}" class="text-empty text-center">
        <i class="fas fa-book-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
        <p>Nenhum item cadastrado no acervo ainda.</p>
        <a th:href="@{/acervo/create}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Cadastrar primeiro item
        </a>
    </div>
    
    <!-- BOTÃO CADASTRAR (com restrição de Admin) -->
    <div class="row mt-4">
        <div class="col">
            <a th:href="@{/acervo/create}">
                <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Cadastrar Acervo
                </button>
            </a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/darkmode-btn :: darkmode-btn}"></th:block>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

<style>
/* Estilos adicionais para melhorar o visual */
.gap-2 {
    gap: 0.5rem;
    display: flex;
    flex-wrap: wrap;
}

.card-livro {
    opacity: 0;
    transition: opacity 0.5s ease;
}

.fade-in {
    opacity: 1;
}

/* Garantia do grid responsivo */
.livros-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 2rem;
}

/* Ajuste para telas menores */
@media (max-width: 768px) {
    .livros-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
    }
}

@media (max-width: 576px) {
    .livros-grid {
        grid-template-columns: 1fr;
    }
}

/* Estilo para a badge */
.badge-tipo {
    background-color: var(--dourado-champagne);
    color: var(--azul-noturno);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-block;
}

/* Hover nos cards */
.card-livro:hover {
    transform: translateY(-8px);
    box-shadow: var(--sombra-dourada-forte);
}

.card-livro-img-wrapper {
    width: 100%;
    height: 320px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--verde-floresta), var(--azul-noturno));
}

.card-livro-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.card-livro:hover .card-livro-img {
    transform: scale(1.08);
}

/* Modo escuro */
body.dark-mode .badge-tipo {
    background-color: var(--dourado-champagne);
    color: var(--azul-noturno);
}

body.dark-mode .card-livro {
    background-color: #11163f;
}

body.dark-mode .card-livro-titulo {
    color: var(--dourado-claro);
}
</style>

</body>
</html>
