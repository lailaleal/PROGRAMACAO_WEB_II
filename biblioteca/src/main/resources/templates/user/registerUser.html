<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Cadastro de Usuário')}"></th:block>
<body>

<th:block th:replace="~{fragments/head :: header}"></th:block>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-container fade-in">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--dourado-champagne);"></i>
                    <h1 class="mt-3">Cadastro de Usuário</h1>
                    <p class="text-muted">Crie sua conta para acessar o sistema</p>
                </div>

                <form th:action="@{/saveUser}" method="post">
                    <!-- Nome -->
                    <div class="form-group">
                        <label for="name">
                            <i class="fas fa-user"></i> Nome *
                        </label>
                        <input type="text" 
                               name="name" 
                               id="name" 
                               class="form-control" 
                               placeholder="Digite seu nome completo"
                               required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> E-mail *
                        </label>
                        <input type="email" 
                               name="email" 
                               id="email" 
                               class="form-control" 
                               placeholder="Digite seu e-mail"
                               required>
                        <small class="form-text text-muted">Seu e-mail será usado para login</small>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Senha *
                        </label>
                        <input type="password" 
                               name="password" 
                               id="password" 
                               class="form-control" 
                               placeholder="Digite sua senha"
                               required>
                    </div>

                    <!-- Roles (Permissões) -->
                    <div class="form-group">
                        <label>
                            <i class="fas fa-tags"></i> Permissões *
                        </label>
                        <div class="form-control" style="height: auto; background: var(--off-white);">
                            <div class="form-check">
                                <input type="checkbox" name="roles" value="Admin" class="form-check-input" id="roleAdmin">
                                <label class="form-check-label" for="roleAdmin">Admin</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="roles" value="Manager" class="form-check-input" id="roleManager">
                                <label class="form-check-label" for="roleManager">Manager</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="roles" value="User" class="form-check-input" id="roleUser" checked>
                                <label class="form-check-label" for="roleUser">User</label>
                            </div>
                        </div>
                        <small class="form-text text-muted">Selecione as permissões do usuário</small>
                    </div>

                    <!-- Token CSRF (Spring Security) -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- Botões -->
                    <div class="form-group text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Registrar
                        </button>
                        <a href="/acervo" class="btn btn-outline-gold btn-lg ml-2">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </div>
                </form>

                <!-- Mensagem de sucesso/erro -->
                <div th:if="${msg}" class="alert alert-success mt-3 text-center" th:text="${msg}"></div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/darkmode-btn :: darkmode-btn}"></th:block>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

<style>
.form-container {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--sombra-media);
    margin: 2rem 0;
}

.form-check {
    margin-bottom: 0.5rem;
}

.form-check-input {
    margin-right: 0.5rem;
}

.alert {
    border-radius: 10px;
}

body.dark-mode .form-container {
    background: #11163f;
}

body.dark-mode .form-check-label {
    color: #e0e0e0;
}

body.dark-mode .form-control {
    background-color: #1a1f4a;
    border-color: #2a2f5a;
    color: white;
}
</style>

</body>
</html>
