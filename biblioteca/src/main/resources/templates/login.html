<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Login - Biblioteca Livre')}"></th:block>
<body>

<th:block th:replace="~{fragments/head :: header}"></th:block>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-container fade-in">
                <div class="text-center mb-4">
                    <i class="fas fa-sign-in-alt" style="font-size: 3rem; color: var(--dourado-champagne);"></i>
                    <h1 class="mt-3">Login</h1>
                    <p class="text-muted">Digite suas credenciais para acessar o sistema</p>
                </div>

                <!-- Mensagem de erro -->
                <div th:if="${param.error}" class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-circle"></i> E-mail ou senha inválidos!
                </div>

                <!-- Mensagem de logout -->
                <div th:if="${param.logout}" class="alert alert-success text-center">
                    <i class="fas fa-check-circle"></i> Você saiu do sistema com sucesso!
                </div>

                <form action="/login" method="post">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-envelope"></i> E-mail
                        </label>
                        <input type="email" 
                               name="username" 
                               id="username" 
                               class="form-control" 
                               placeholder="Digite seu e-mail"
                               required autofocus>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Senha
                        </label>
                        <input type="password" 
                               name="password" 
                               id="password" 
                               class="form-control" 
                               placeholder="Digite sua senha"
                               required>
                    </div>

                    <!-- CSRF Token -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- Botões -->
                    <div class="form-group text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg btn-block">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>

                    <!-- Link para registro -->
                    <div class="text-center mt-3">
                        <p class="mb-0">
                            Não tem uma conta? 
                            <a href="/register" class="text-gold">Cadastre-se aqui</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/darkmode-btn :: darkmode-btn}"></th:block>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

<style>
.form-container {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: var(--sombra-media);
    margin: 2rem 0;
}

.btn-block {
    width: 100%;
    display: block;
}

.text-gold {
    color: var(--dourado-champagne);
    font-weight: 600;
}

.text-gold:hover {
    text-decoration: underline;
}

.alert {
    border-radius: 10px;
    margin-bottom: 1.5rem;
}

body.dark-mode .form-container {
    background: #11163f;
}

body.dark-mode .alert-danger {
    background-color: #2a1a1a;
    border-color: #dc3545;
    color: #ffaaaa;
}

body.dark-mode .alert-success {
    background-color: #1a2a1a;
    border-color: #28a745;
    color: #aaffaa;
}
</style>

</body>
</html>
